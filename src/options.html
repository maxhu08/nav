<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="shared/sonner.css" />
    <link rel="stylesheet" href="shared/tailwind.css" />
    <link rel="stylesheet" href="shared/shared.css" />
    <script src="options/scripts/utils/sonner.ts" type="module" defer></script>
    <script src="options/scripts/init.ts" type="module" defer></script>
    <link rel="icon" href="assets/icon.png" type="image/png" />
    <title>options ヽ(・ω・*)</title>
  </head>

  <body dir="ltr" class="min-h-screen bg-neutral-900">
    <div id="toaster-wrapper" data-rich-colors="true" data-expand="false" data-position="top-center"></div>
    <div class="mx-auto grid w-[95%] grid-flow-row sm:w-[80%] md:w-[60%] lg:w-[50%] xl:w-[40%]">
      <div class="grid place-items-center gap-4 p-4">
        <img id="nav-logo" src="./assets/icon.png" class="aspect-square w-40" alt="nav logo" />
        <h1 class="w-max text-2xl font-semibold text-white md:text-4xl"><span class="text-yellow-500">nav</span><span class="text-neutral-500">/</span><span>options</span></h1>
      </div>
      <div>
        <p class="text-center text-sm md:text-base">
          <a href="https://github.com/maxhu08/nav" target="_blank" class="cursor-pointer text-blue-500 transition hover:text-blue-600">github</a>
          <span class="text-neutral-500"> | </span>
          <span id="version-number-text" class="text-indigo-500">v</span>
          <span class="text-neutral-500"> | </span>
          <span id="user-agent-text" class="text-orange-500"></span>
        </p>
      </div>
      <main class="grid grid-flow-row pt-16">
        <section id="hotkeys-section" class="mb-20 grid grid-flow-row gap-4">
          <div class="grid gap-2">
            <p class="text-base text-white">hotkeys.mappings</p>
            <p class="text-base text-neutral-500">one mapping per line: &lt;key-sequence&gt; &lt;action-name&gt;</p>
            <p class="text-base text-neutral-500">lines starting with # are ignored</p>
            <div id="hotkeys-mappings-container" class="w-full rounded-md border-2 border-transparent bg-neutral-800 p-1 text-base">
              <textarea
                id="hotkeys-mappings-textarea"
                autocomplete="off"
                spellcheck="false"
                rows="16"
                class="w-full resize-none bg-transparent text-base text-white placeholder-neutral-500 outline-none"
                placeholder="# &lt;key-sequence&gt; &lt;action-name&gt;"
              ></textarea>
            </div>
          </div>
          <div class="flex flex-wrap items-center justify-center gap-3">
            <button id="save-config-button" class="cursor-pointer rounded-md bg-yellow-500 px-4 py-2 transition hover:bg-yellow-600">
              <span class="text-base text-white">save</span>
            </button>
            <button id="reset-config-button" class="cursor-pointer rounded-md bg-rose-500 px-4 py-2 transition hover:bg-rose-600">
              <span class="text-base text-white">reset to default</span>
            </button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
