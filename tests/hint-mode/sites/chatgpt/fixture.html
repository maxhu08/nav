<div class="composer-shell">
  <form class="group/composer" data-type="unified-composer">
    <div data-composer-surface="true">
      <div class="leading">
        <button type="button" class="composer-btn" data-testid="composer-plus-btn" aria-label="Add files and more" id="composer-plus-btn"></button>
      </div>

      <div class="primary">
        <div contenteditable="true" translate="no" class="ProseMirror" id="prompt-textarea" role="textbox" aria-multiline="true" aria-label="Chat with ChatGPT">
          <p><br /></p>
        </div>
      </div>

      <div class="trailing">
        <button aria-label="Start dictation" type="button" class="composer-btn"></button>
        <button type="button" aria-label="Start Voice" class="composer-submit-button-color"></button>
      </div>
    </div>
  </form>
</div>
